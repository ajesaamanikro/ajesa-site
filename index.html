<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>AJESA – Association des Jeunes Solidaires d'Amanikro</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600;700&family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
<style>
:root{
  --G:#1B6E3E;--G2:#2D9B5C;--GP:#E8F5EE;
  --O:#E8A020;--OL:#FFC947;
  --R:#B83225;
  --N:#0C1A10;--N2:#162A1C;
  --BG:#F4F1EB;--BG2:#E2DDD4;
  --T:#1A2E1E;--TS:#5A7060;
  --W:#FDFAF4;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:'Outfit',sans-serif;background:var(--W);color:var(--T);overflow-x:hidden}
a{text-decoration:none;color:inherit}
::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-track{background:var(--N)}
::-webkit-scrollbar-thumb{background:var(--O);border-radius:10px}

/* NAV */
#nav{position:fixed;top:0;left:0;right:0;z-index:900;display:flex;align-items:center;justify-content:space-between;padding:1rem 2.5rem;transition:all .35s}
#nav.active{background:rgba(12,26,16,.96);backdrop-filter:blur(18px);padding:.7rem 2.5rem;box-shadow:0 2px 24px rgba(0,0,0,.35)}
.nb{display:flex;align-items:center;gap:.8rem}
.nb-name{font-family:'Cormorant Garamond',serif;font-size:1.35rem;font-weight:700;color:#fff}
.nb-name span{color:var(--O)}
.nm{display:flex;align-items:center;gap:1.8rem;list-style:none}
.nm a{color:rgba(255,255,255,.72);font-size:.85rem;font-weight:500;position:relative;transition:color .2s}
.nm a::after{content:'';position:absolute;bottom:-4px;left:0;width:0;height:2px;background:var(--O);transition:width .3s}
.nm a:hover{color:#fff}.nm a:hover::after{width:100%}
.n-cta{background:var(--O);color:var(--N);font-weight:700;font-size:.82rem;padding:.5rem 1.4rem;border-radius:100px;transition:all .2s}
.n-cta:hover{background:var(--OL);transform:translateY(-2px)}
.burger{display:none;flex-direction:column;gap:5px;cursor:pointer;padding:.3rem;background:none;border:none}
.burger span{width:22px;height:2px;background:#fff;border-radius:2px}
.mob{position:fixed;inset:0;z-index:850;background:var(--N);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2rem;transform:translateX(100%);transition:transform .4s cubic-bezier(.77,0,.18,1)}
.mob.open{transform:translateX(0)}
.mob a{color:#fff;font-size:1.4rem;font-weight:600;transition:color .2s}
.mob a:hover{color:var(--O)}
.mob-x{position:absolute;top:1.5rem;right:1.5rem;background:none;color:var(--O);font-size:2rem;cursor:pointer;border:none}
@media(max-width:900px){.nm,.n-cta{display:none}.burger{display:flex}}

/* HERO */
#hero{min-height:100vh;background:var(--N);display:flex;flex-direction:column;align-items:center;justify-content:center;position:relative;overflow:hidden;padding:7rem 1.5rem 5rem;text-align:center}
.orb{position:absolute;border-radius:50%;filter:blur(90px);animation:drift 10s ease-in-out infinite alternate}
.oa{width:600px;height:600px;background:rgba(27,110,62,.28);top:-150px;left:-200px}
.ob{width:450px;height:450px;background:rgba(232,160,32,.14);bottom:-100px;right:-100px;animation-delay:-4s}
.oc{width:300px;height:300px;background:rgba(184,50,37,.1);top:40%;left:55%;animation-delay:-7s}
.h-grid{position:absolute;inset:0;background-image:linear-gradient(rgba(255,255,255,.025) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.025) 1px,transparent 1px);background-size:60px 60px}
.hc{position:relative;z-index:2;max-width:820px}
.h-pill{display:inline-flex;align-items:center;gap:.5rem;background:rgba(232,160,32,.15);border:1px solid rgba(232,160,32,.3);color:var(--O);font-size:.78rem;font-weight:600;letter-spacing:.15em;text-transform:uppercase;padding:.4rem 1.1rem;border-radius:100px;margin-bottom:2rem;animation:fadeUp .7s ease both}
.h-logo{width:165px;height:165px;margin:0 auto 2rem;animation:fadeUp .7s .1s ease both}
.h-logo svg{width:100%;height:100%;filter:drop-shadow(0 0 30px rgba(232,160,32,.45));animation:rotateSlow 20s linear infinite}
.h-title{font-family:'Cormorant Garamond',serif;font-size:clamp(2.6rem,7vw,5rem);font-weight:700;color:#fff;line-height:1.06;margin-bottom:1.2rem;animation:fadeUp .7s .2s ease both}
.gold{color:transparent;background:linear-gradient(90deg,var(--O),var(--OL),var(--O));background-size:200%;-webkit-background-clip:text;background-clip:text;animation:shimmer 3s linear infinite}
.h-sub{font-size:clamp(.95rem,2vw,1.15rem);color:rgba(255,255,255,.6);max-width:560px;margin:0 auto 2.5rem;line-height:1.75;animation:fadeUp .7s .3s ease both}
.h-btns{display:flex;gap:1rem;justify-content:center;flex-wrap:wrap;animation:fadeUp .7s .4s ease both}
.btn-p{background:var(--O);color:var(--N);font-weight:700;padding:.85rem 2rem;border-radius:100px;font-size:.95rem;transition:all .25s;box-shadow:0 4px 20px rgba(232,160,32,.35)}
.btn-p:hover{background:var(--OL);transform:translateY(-3px)}
.btn-o{border:2px solid rgba(255,255,255,.28);color:#fff;font-weight:600;padding:.85rem 2rem;border-radius:100px;font-size:.95rem;transition:all .25s}
.btn-o:hover{border-color:var(--O);background:rgba(232,160,32,.1);transform:translateY(-3px)}
.h-stats{display:flex;gap:3rem;justify-content:center;flex-wrap:wrap;margin-top:4rem;padding-top:3rem;border-top:1px solid rgba(255,255,255,.1);animation:fadeUp .7s .5s ease both}
.stat .sn{font-family:'Cormorant Garamond',serif;font-size:2.4rem;font-weight:700;color:var(--O);display:block}
.stat .sl{font-size:.72rem;color:rgba(255,255,255,.45);letter-spacing:.12em;text-transform:uppercase;margin-top:.2rem}
.scroll-ind{position:absolute;bottom:2rem;left:50%;transform:translateX(-50%);display:flex;flex-direction:column;align-items:center;gap:.4rem;color:rgba(255,255,255,.3);font-size:.7rem;letter-spacing:.12em;text-transform:uppercase;animation:bounce 2s ease-in-out infinite;z-index:2}
.scroll-ind::after{content:'';width:1px;height:45px;background:linear-gradient(to bottom,rgba(232,160,32,.6),transparent)}

/* COMMONS */
.sec{padding:6rem 1.5rem}
.cont{max-width:1100px;margin:0 auto}
.lbl{font-size:.72rem;font-weight:700;letter-spacing:.25em;text-transform:uppercase;color:var(--O);margin-bottom:.5rem;display:flex;align-items:center;gap:.6rem}
.lbl::before{content:'';width:22px;height:2px;background:var(--O)}
.ttl{font-family:'Cormorant Garamond',serif;font-size:clamp(1.9rem,4vw,3rem);font-weight:700;line-height:1.15;margin-bottom:.8rem}
.desc{color:var(--TS);line-height:1.75;max-width:560px;font-size:.96rem}
.reveal{opacity:0;transform:translateY(36px);transition:opacity .7s,transform .7s}
.revL{opacity:0;transform:translateX(-36px);transition:opacity .7s,transform .7s}
.revR{opacity:0;transform:translateX(36px);transition:opacity .7s,transform .7s}
.on{opacity:1!important;transform:none!important}
.d1{transition-delay:.1s}.d2{transition-delay:.2s}.d3{transition-delay:.3s}.d4{transition-delay:.4s}.d5{transition-delay:.5s}

/* PRÉSENTATION */
#presentation{background:var(--W)}
.ab-grid{display:grid;grid-template-columns:1fr 1fr;gap:4rem;align-items:center}
@media(max-width:768px){.ab-grid{grid-template-columns:1fr;gap:2rem}}
.ab-vis{background:linear-gradient(135deg,var(--G),var(--N2));border-radius:24px;padding:3rem 2rem;text-align:center;position:relative;overflow:hidden}
.ab-vis svg{width:130px;height:130px;position:relative;z-index:1;filter:drop-shadow(0 8px 24px rgba(0,0,0,.3))}
.ab-vis-t{font-family:'Cormorant Garamond',serif;font-size:1.4rem;font-weight:700;color:#fff;margin-top:1.2rem}
.ab-vis-s{color:rgba(255,255,255,.6);font-size:.85rem;margin-top:.4rem}
.val-list{display:flex;flex-direction:column;gap:1rem;margin-top:2rem}
.vi{display:flex;gap:1rem;align-items:flex-start;padding:1.2rem;border-radius:12px;background:#fff;border-left:4px solid var(--G);box-shadow:0 4px 18px rgba(0,0,0,.06);transition:transform .25s}
.vi:hover{transform:translateX(5px)}
.vi-ic{font-size:1.5rem;flex-shrink:0;margin-top:.1rem}
.vi h4{font-size:.95rem;font-weight:700;color:var(--G);margin-bottom:.2rem}
.vi p{font-size:.83rem;color:var(--TS);line-height:1.6}

/* STRUCTURE */
#structure{background:var(--N);color:#fff}
.bureau-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(195px,1fr));gap:1.2rem;margin-bottom:3rem}
.bc{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);border-radius:16px;padding:1.8rem 1.2rem;text-align:center;position:relative;overflow:hidden;transition:all .3s}
.bc::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--G),var(--O))}
.bc:hover{transform:translateY(-5px);background:rgba(255,255,255,.1)}
.bc-av{width:62px;height:62px;border-radius:50%;background:linear-gradient(135deg,var(--G),var(--O));margin:0 auto 1rem;display:flex;align-items:center;justify-content:center;font-size:1.7rem}
.bc-role{font-size:.7rem;font-weight:700;letter-spacing:.15em;text-transform:uppercase;color:var(--O);margin-bottom:.3rem}
.bc-name{font-family:'Cormorant Garamond',serif;font-size:1rem;font-weight:700;color:#fff;margin-bottom:.2rem}
.bc-info{font-size:.75rem;color:rgba(255,255,255,.4);font-style:italic}
.com-ttl{font-size:.75rem;font-weight:700;letter-spacing:.2em;text-transform:uppercase;color:var(--O);margin-bottom:1.2rem;display:flex;align-items:center;gap:.5rem}
.com-ttl::before{content:'';width:18px;height:2px;background:var(--O)}
.com-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(195px,1fr));gap:1rem}
.cc{background:rgba(27,110,62,.2);border:1px solid rgba(27,110,62,.45);border-radius:12px;padding:1.2rem;display:flex;gap:.8rem;align-items:flex-start;transition:all .25s}
.cc:hover{background:rgba(27,110,62,.35);transform:translateY(-3px)}
.cc-ic{font-size:1.5rem;flex-shrink:0}
.cc h4{font-size:.88rem;font-weight:700;color:var(--O);margin-bottom:.25rem}
.cc p{font-size:.76rem;color:rgba(255,255,255,.5);line-height:1.55}

/* MEMBRES */
#membres{background:var(--BG)}
.mbr-top{display:flex;justify-content:space-between;align-items:flex-end;flex-wrap:wrap;gap:1rem;margin-bottom:2.5rem}
.mbr-cnt{background:var(--G);color:#fff;font-weight:700;font-size:.85rem;padding:.5rem 1.2rem;border-radius:100px}
.mbr-srch{padding:.7rem 1rem;border:2px solid var(--BG2);border-radius:10px;font-family:'Outfit',sans-serif;font-size:.9rem;width:240px;outline:none;transition:border .2s}
.mbr-srch:focus{border-color:var(--G)}
.tbl-wrap{background:#fff;border-radius:18px;overflow:hidden;box-shadow:0 6px 32px rgba(0,0,0,.1)}
table{width:100%;border-collapse:collapse}
thead{background:linear-gradient(90deg,var(--G),var(--N2))}
thead th{color:#fff;font-size:.78rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;padding:1rem 1.2rem;text-align:left}
tbody tr{border-bottom:1px solid var(--BG2);transition:background .2s}
tbody tr:hover{background:var(--GP)}
tbody td{padding:.9rem 1.2rem;font-size:.88rem;color:var(--T)}
.badge{display:inline-block;padding:.2rem .65rem;border-radius:100px;font-size:.7rem;font-weight:700}
.b-actif{background:var(--GP);color:var(--G)}
.b-fond{background:rgba(232,160,32,.15);color:#9a6a00}
.mbr-btn{background:var(--O);color:var(--N);font-weight:700;font-size:.85rem;padding:.6rem 1.4rem;border-radius:100px;border:none;cursor:pointer;transition:all .2s}
.mbr-btn:hover{background:var(--OL)}

/* PROJETS */
#projets{background:var(--W)}
.proj-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(310px,1fr));gap:1.5rem}
.pc{background:#fff;border-radius:20px;overflow:hidden;box-shadow:0 6px 28px rgba(0,0,0,.08);transition:all .3s}
.pc:hover{transform:translateY(-7px);box-shadow:0 14px 50px rgba(0,0,0,.13)}
.ph{padding:2rem;position:relative;overflow:hidden}
.ph1{background:linear-gradient(135deg,#1B6E3E,#0f4a28)}
.ph2{background:linear-gradient(135deg,#E8A020,#c07010)}
.ph3{background:linear-gradient(135deg,#B83225,#8a2319)}
.ph4{background:linear-gradient(135deg,#1a6b9a,#0d4a6e)}
.ph5{background:linear-gradient(135deg,#7a3d9e,#522a6c)}
.ph6{background:linear-gradient(135deg,#1B6E3E,#E8A020)}
.ph-ic{font-size:2.8rem;position:relative;z-index:1}
.ph-deco{position:absolute;bottom:-20px;right:-20px;width:90px;height:90px;border-radius:50%;background:rgba(255,255,255,.1)}
.pb{padding:1.5rem}
.ptag{display:inline-block;background:var(--GP);color:var(--G);font-size:.68rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;padding:.22rem .65rem;border-radius:100px;margin-bottom:.7rem}
.pb h3{font-size:1.02rem;font-weight:700;margin-bottom:.45rem;color:var(--T)}
.pb p{font-size:.83rem;color:var(--TS);line-height:1.65;margin-bottom:1rem}
.pf{display:flex;justify-content:space-between;align-items:center}
.pst{font-size:.75rem;font-weight:600;color:var(--O);display:flex;align-items:center;gap:.35rem}
.pst::before{content:'';width:7px;height:7px;background:var(--O);border-radius:50%;animation:pulse 1.5s infinite}

/* CONTACT */
#contact{background:var(--BG)}
.ct-grid{display:grid;grid-template-columns:1fr 1fr;gap:3rem;align-items:start}
@media(max-width:768px){.ct-grid{grid-template-columns:1fr}}
.ct-info{display:flex;flex-direction:column;gap:1rem}
.cti{display:flex;gap:1rem;align-items:center;padding:1.2rem;border-radius:12px;background:#fff;box-shadow:0 4px 18px rgba(0,0,0,.06);transition:transform .2s}
.cti:hover{transform:translateX(5px)}
.cti-ic{width:46px;height:46px;border-radius:12px;background:var(--GP);display:flex;align-items:center;justify-content:center;font-size:1.3rem;flex-shrink:0}
.cti-ic.wa{background:#e7ffe9}.cti-ic.em{background:#fff7e7}.cti-ic.fb{background:#e7f0ff}.cti-ic.tk{background:#ffe7f0}
.cti h4{font-size:.8rem;font-weight:700;color:var(--G);text-transform:uppercase;letter-spacing:.08em;margin-bottom:.2rem}
.cti p,.cti a{font-size:.9rem;color:var(--T)}
.cti a{color:var(--G);font-weight:600}.cti a:hover{color:var(--O)}
.cti small{font-size:.75rem;color:var(--TS);font-style:italic}
.soc-row{display:flex;gap:.8rem;flex-wrap:wrap;margin-top:.5rem}
.sb{display:inline-flex;align-items:center;gap:.5rem;padding:.5rem 1rem;border-radius:8px;font-size:.82rem;font-weight:600;transition:all .2s;border:none;cursor:pointer;text-decoration:none}
.sb-wa{background:#25D366;color:#fff}.sb-wa:hover{background:#1da851}
.sb-em{background:var(--G);color:#fff}.sb-em:hover{background:var(--G2)}
.sb-fb{background:#1877F2;color:#fff}.sb-fb:hover{background:#1565c0}
.sb-tk{background:#010101;color:#fff}.sb-tk:hover{background:#333}
.ct-form{background:#fff;border-radius:20px;padding:2rem;box-shadow:0 4px 24px rgba(0,0,0,.07)}
.ct-form h3{font-family:'Cormorant Garamond',serif;font-size:1.4rem;font-weight:700;color:var(--T);margin-bottom:1.5rem}
.fg{margin-bottom:1.1rem}
.fg label{display:block;font-size:.8rem;font-weight:600;color:var(--G);margin-bottom:.4rem}
.fg input,.fg textarea,.fg select{width:100%;padding:.75rem 1rem;border:2px solid var(--BG2);border-radius:10px;font-family:'Outfit',sans-serif;font-size:.9rem;color:var(--T);outline:none;transition:all .2s;background:#fff}
.fg input:focus,.fg textarea:focus,.fg select:focus{border-color:var(--G);box-shadow:0 0 0 3px rgba(27,110,62,.1)}
.fg textarea{resize:vertical;min-height:100px}
.fg-row{display:grid;grid-template-columns:1fr 1fr;gap:1rem}
@media(max-width:500px){.fg-row{grid-template-columns:1fr}}
.fsub{width:100%;padding:.9rem;border-radius:10px;background:linear-gradient(90deg,var(--G),var(--N2));color:#fff;font-family:'Outfit',sans-serif;font-weight:700;font-size:.95rem;border:none;cursor:pointer;transition:all .2s}
.fsub:hover{opacity:.9;transform:translateY(-2px)}

/* FOOTER */
footer{background:var(--N);color:#fff;padding:4rem 1.5rem 2rem}
.ft-top{display:grid;grid-template-columns:2fr 1fr 1fr;gap:3rem;padding-bottom:2.5rem;border-bottom:1px solid rgba(255,255,255,.08);margin-bottom:2rem}
@media(max-width:768px){.ft-top{grid-template-columns:1fr}}
.ft-name{font-family:'Cormorant Garamond',serif;font-size:1.6rem;font-weight:700;color:#fff;margin-bottom:.5rem}
.ft-name span{color:var(--O)}
.ft-brand p{font-size:.84rem;color:rgba(255,255,255,.45);line-height:1.75;max-width:270px;margin-top:.5rem}
.ft-soc{display:flex;gap:.7rem;margin-top:1.2rem}
.ft-soc a{width:36px;height:36px;border-radius:8px;background:rgba(255,255,255,.07);display:flex;align-items:center;justify-content:center;font-size:1rem;transition:all .2s}
.ft-soc a:hover{background:var(--O);transform:translateY(-2px)}
.ft-col h4{font-size:.75rem;font-weight:700;letter-spacing:.2em;text-transform:uppercase;color:var(--O);margin-bottom:1rem}
.ft-col ul{list-style:none;display:flex;flex-direction:column;gap:.6rem}
.ft-col ul li a{font-size:.84rem;color:rgba(255,255,255,.45);transition:color .2s}
.ft-col ul li a:hover{color:#fff}
.ft-bot{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:1rem}
.ft-bot p{font-size:.77rem;color:rgba(255,255,255,.28)}
.ft-heart{color:var(--R)}

/* MODAL */
.moverlay{position:fixed;inset:0;z-index:1000;background:rgba(0,0,0,.6);backdrop-filter:blur(6px);display:flex;align-items:center;justify-content:center;padding:1.5rem;opacity:0;pointer-events:none;transition:opacity .3s}
.moverlay.open{opacity:1;pointer-events:all}
.modal{background:#fff;border-radius:20px;width:100%;max-width:720px;max-height:85vh;overflow:hidden;display:flex;flex-direction:column;transform:scale(.94);transition:transform .3s;box-shadow:0 20px 80px rgba(0,0,0,.25)}
.moverlay.open .modal{transform:scale(1)}
.mhdr{display:flex;align-items:center;justify-content:space-between;padding:1.5rem 2rem;border-bottom:1px solid var(--BG2);background:linear-gradient(90deg,var(--G),var(--N2))}
.mhdr h2{font-family:'Cormorant Garamond',serif;font-size:1.3rem;font-weight:700;color:#fff}
.mhdr small{font-size:.8rem;color:rgba(255,255,255,.65);margin-top:.1rem;display:block}
.mcls{background:rgba(255,255,255,.15);color:#fff;border:none;width:34px;height:34px;border-radius:50%;font-size:1.1rem;cursor:pointer}
.mcls:hover{background:rgba(255,255,255,.3)}
.mbody{overflow-y:auto;padding:1.5rem 2rem;flex:1}
.msrch{width:100%;padding:.7rem 1rem;border:2px solid var(--BG2);border-radius:10px;font-family:'Outfit',sans-serif;font-size:.9rem;outline:none;margin-bottom:1.2rem;transition:border .2s}
.msrch:focus{border-color:var(--G)}
.mtbl{overflow-x:auto}
.modal table{font-size:.85rem}
.modal thead th{background:var(--GP);color:var(--G);font-size:.72rem}
.mfoot{padding:1rem 2rem;border-top:1px solid var(--BG2);display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:1rem}
.mfoot p{font-size:.8rem;color:var(--TS)}
.mexp{background:var(--G);color:#fff;font-size:.82rem;font-weight:600;padding:.5rem 1.1rem;border-radius:8px;border:none;cursor:pointer}
.mexp:hover{background:var(--G2)}

/* BTT */
#btt{position:fixed;bottom:2rem;right:2rem;z-index:800;width:44px;height:44px;border-radius:50%;background:var(--O);color:var(--N);border:none;cursor:pointer;font-size:1.1rem;box-shadow:0 4px 18px rgba(232,160,32,.4);opacity:0;transform:translateY(20px);transition:all .3s}
#btt.show{opacity:1;transform:translateY(0)}
#btt:hover{background:var(--OL)}

@keyframes fadeUp{from{opacity:0;transform:translateY(28px)}to{opacity:1;transform:translateY(0)}}
@keyframes drift{from{transform:translate(0,0) scale(1)}to{transform:translate(28px,18px) scale(1.08)}}
@keyframes rotateSlow{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
@keyframes shimmer{0%{background-position:0%}100%{background-position:200%}}
@keyframes bounce{0%,100%{transform:translateX(-50%) translateY(0)}50%{transform:translateX(-50%) translateY(8px)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
@media(max-width:600px){.h-stats{gap:1.5rem}.mbr-srch{width:100%}.mbr-top{flex-direction:column;align-items:flex-start}}
</style>
</head>
<body>
